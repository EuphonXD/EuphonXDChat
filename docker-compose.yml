services:
  webchat:
    build: .
    container_name: webchat
    restart: unless-stopped
    ports:
      - "23777:23777"
    volumes:
      - webchat-data:/app/data
    environment:
      - JWT_SECRET=change-me-in-production
      - PORT=23777
      - NODE_ENV=production

volumes:
  webchat-data:
    driver: local
